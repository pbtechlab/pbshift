<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="498" rx="18" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <text x="40" y="52" font-size="26" font-weight="800" fill="#e6edf3">Multi-resolution — the right window size for each frequency band</text>
  <text x="40" y="82" font-size="16" fill="#8b949e">a single window forces a compromise; splitting the spectrum lets each band use the window it needs</text>

  <!-- input -->
  <rect x="40" y="200" width="150" height="110" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="115" y="248" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">input</text>
  <text x="115" y="274" font-size="14" fill="#8b949e" text-anchor="middle">spectrum</text>

  <!-- LOW band -->
  <rect x="330" y="120" width="470" height="140" rx="12" fill="#0e1726" stroke="#1f6feb" stroke-width="2"/>
  <text x="352" y="152" font-size="18" font-weight="800" fill="#58a6ff">LOW band · long window</text>
  <!-- long (wide) window bump -->
  <path d="M352,232 Q392,150 432,232" fill="none" stroke="#58a6ff" stroke-width="3"/>
  <text x="470" y="196" font-size="15" fill="#adbac7">fine <tspan font-weight="700" fill="#e6edf3">frequency</tspan> resolution</text>
  <text x="470" y="220" font-size="15" fill="#adbac7">separates dense partials</text>
  <text x="470" y="244" font-size="15" font-weight="700" fill="#3fb950">→ removes chorusing</text>

  <!-- HIGH band -->
  <rect x="330" y="290" width="470" height="140" rx="12" fill="#0f1d14" stroke="#238636" stroke-width="2"/>
  <text x="352" y="322" font-size="18" font-weight="800" fill="#3fb950">HIGH band · short window</text>
  <!-- short (narrow) window bump -->
  <path d="M372,402 Q392,330 412,402" fill="none" stroke="#3fb950" stroke-width="3"/>
  <text x="470" y="366" font-size="15" fill="#adbac7">fine <tspan font-weight="700" fill="#e6edf3">time</tspan> resolution</text>
  <text x="470" y="390" font-size="15" fill="#adbac7">localises attacks in time</text>
  <text x="470" y="414" font-size="15" font-weight="700" fill="#3fb950">→ keeps transients sharp</text>

  <!-- output -->
  <rect x="940" y="200" width="170" height="110" rx="12" fill="#132119" stroke="#238636" stroke-width="2"/>
  <text x="1025" y="242" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">output</text>
  <text x="1025" y="266" font-size="13.5" fill="#3fb950" text-anchor="middle">clean + sharp</text>

  <!-- arrows -->
  <path d="M192,240 C250,240 270,190 328,190" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M192,270 C250,270 270,360 328,360" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M802,190 C860,190 880,240 938,240" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M802,360 C860,360 880,275 938,270" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="855" y="228" font-size="20" fill="#8b949e">+</text>

  <!-- content-adaptive routing note -->
  <text x="40" y="470" font-size="15" fill="#8b949e"><tspan font-weight="700" fill="#adbac7">content-adaptive:</tspan>  percussion → single short window   ·   sustained tone / held vowel → single long window   ·   tonal mix → the band split above</text>
</svg>
